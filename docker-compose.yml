version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: ai_doc_rag_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_doc_rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_admin} -d ${POSTGRES_DB:-ai_doc_rag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_doc_rag_backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ai_doc_rag}
      STORAGE_PATH: /app/storage
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - storage_volume:/app/storage
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy


  adminer:
    image: adminer
    container_name: ai_doc_rag_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  postgres_data:
  storage_volume:
  hf_cache:

